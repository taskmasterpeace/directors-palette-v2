<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Genre Neural Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a12;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    touch-action: none;
  }

  /* Selected tags panel */
  .selected-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: linear-gradient(to top, rgba(10,10,18,0.97) 70%, transparent);
    padding: 16px 16px 20px;
    max-height: 40vh;
    overflow-y: auto;
    transition: transform 0.3s ease;
  }
  .selected-panel.empty { transform: translateY(100%); }
  .selected-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 8px;
  }
  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .selected-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .selected-tag:hover { filter: brightness(1.3); }
  .selected-tag .x {
    font-size: 14px;
    opacity: 0.5;
    margin-left: 2px;
  }
  .selected-tag.genre { background: rgba(255,140,50,0.2); color: #ff9944; border-color: rgba(255,140,50,0.3); }
  .selected-tag.sub { background: rgba(100,180,255,0.15); color: #7cb8ff; border-color: rgba(100,180,255,0.25); }
  .selected-tag.micro { background: rgba(180,100,255,0.15); color: #c490ff; border-color: rgba(180,100,255,0.25); }

  /* Instructions overlay */
  .instructions {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(20,20,35,0.85);
    backdrop-filter: blur(12px);
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.06);
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s ease 3s;
    text-align: center;
  }
  .instructions.fade { opacity: 0; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    z-index: 30;
    background: rgba(20,20,40,0.95);
    backdrop-filter: blur(10px);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12px;
    color: #ddd;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    text-align: center;
  }
  .tooltip.show { opacity: 1; }

  /* Reset button */
  .reset-btn {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 20;
    background: rgba(255,60,60,0.15);
    color: #ff6666;
    border: 1px solid rgba(255,60,60,0.3);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(255,60,60,0.3); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="instructions" id="instructions">
  Tap a genre node to explore · Tap subgenres to go deeper · Drag to pan
</div>

<button class="reset-btn" id="resetBtn">Reset All</button>

<div class="tooltip" id="tooltip"></div>

<div class="selected-panel empty" id="selectedPanel">
  <div class="selected-label">Your Genre DNA</div>
  <div class="selected-tags" id="selectedTags"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
const TAXONOMY = [
  {
    name: 'Hip-Hop/Rap', color: '#ff8833', children: [
      { name: 'Trap', children: ['Latin Trap','EDM Trap','Phonk','Plugg','Drill (Chicago)','Drill (Brooklyn)','Melodic Trap'] },
      { name: 'Boom Bap', children: ['East Coast Boom Bap','Jazz Rap','Golden Age','Gritty Boom Bap','Lo-Fi Boom Bap'] },
      { name: 'Southern Hip-Hop', children: ['Atlanta Rap','Dirty South','Crunk','Houston Rap','Chopped & Screwed'] },
      { name: 'Memphis Rap', children: ['Dark Memphis','Underground Memphis','Memphis Phonk'] },
      { name: 'Gangsta Rap', children: ['West Coast G-Funk','Mafioso Rap','Reality Rap','Street Rap'] },
      { name: 'Conscious Rap', children: ['Political Hip-Hop','Afrocentric Rap','Backpack Rap'] },
      { name: 'East Coast Hip-Hop', children: ['New York Rap','Gritty Buffalo Rap','NYC Underground','Philly Rap'] },
      { name: 'West Coast Hip-Hop', children: ['G-Funk','Hyphy','Bay Area Rap','Chicano Rap'] },
    ]
  },
  {
    name: 'R&B/Soul', color: '#cc44ff', children: [
      { name: 'Neo-Soul', children: ['Conscious Soul','Organic Soul','Live Band Neo-Soul','Bohemian Soul'] },
      { name: 'Trap Soul', children: ['Melodic Trap Soul','Dark Trap Soul','Moody Trap Soul','Vulnerable Trap Soul'] },
      { name: 'Contemporary R&B', children: ['90s R&B','Modern R&B','Bedroom R&B','Late Night R&B'] },
      { name: 'Progressive R&B', children: ['Introspective R&B','Art Soul','Cinematic R&B','Lo-Fi R&B'] },
      { name: 'Classic R&B', children: ['Motown','Quiet Storm','Slow Jams','R&B Ballads'] },
      { name: 'Funk', children: ['P-Funk','Electro-Funk','Nu-Funk','Synth Funk','Deep Funk'] },
      { name: 'Street R&B', children: ['Hood R&B','Gangsta R&B','Hip-Hop Soul'] },
      { name: 'Vocal R&B', children: ['Power Ballad Soul','Melismatic R&B','Gospel-Influenced R&B'] },
    ]
  },
  {
    name: 'Jazz', color: '#33bbff', children: [
      { name: 'Bebop', children: ['Hard Bop','Post Bop','Neo Bop'] },
      { name: 'Jazz Fusion', children: ['Jazz-Rock Fusion','Jazz-Funk','Prog-Jazz'] },
      { name: 'Smooth Jazz', children: ['Urban Contemporary Jazz','New Age Jazz'] },
      { name: 'Cool Jazz', children: ['West Coast Cool','Third Stream'] },
    ]
  },
  {
    name: 'Electronic', color: '#44ff88', children: [
      { name: 'House', children: ['Deep House','Tech House','Chicago House','Afro House'] },
      { name: 'Techno', children: ['Minimal Techno','Detroit Techno','Acid Techno'] },
      { name: 'Drum & Bass', children: ['Liquid DnB','Jungle','Neurofunk'] },
      { name: 'Dubstep', children: ['Riddim','Melodic Dubstep'] },
    ]
  },
  {
    name: 'Reggae', color: '#ffcc33', children: [
      { name: 'Dancehall', children: ['Modern Dancehall','Bashment','Digital Dancehall'] },
      { name: 'Roots Reggae', children: ['Nyabinghi','Cultural Roots'] },
      { name: 'Dub', children: ['Roots Dub','Digital Dub'] },
    ]
  },
  {
    name: 'African & Diaspora', color: '#ff5577', children: [
      { name: 'Afrobeats', children: ['Afro-Pop','Afro-Fusion'] },
      { name: 'Amapiano', children: ['Deep Amapiano','Vocal Amapiano','Yanos'] },
      { name: 'Afro House', children: ['Deep Afro House','Tribal House'] },
    ]
  },
];

// ─── STATE ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let nodes = [];
let connections = [];
let selected = new Set();
let expandedGenres = new Set();
let expandedSubs = new Set();
let panX = 0, panY = 0;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let panOffset = { x: 0, y: 0 };
let hoveredNode = null;
let animationTime = 0;
let touchStartTime = 0;

// Node types: 'genre', 'sub', 'micro'
class Node {
  constructor(name, type, x, y, color, parent) {
    this.name = name;
    this.type = type;
    this.targetX = x;
    this.targetY = y;
    this.x = parent ? parent.x : x;
    this.y = parent ? parent.y : y;
    this.color = color;
    this.parent = parent;
    this.radius = type === 'genre' ? 32 : type === 'sub' ? 20 : 13;
    this.scale = 0;
    this.targetScale = 1;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.visible = type === 'genre';
  }

  get screenX() { return this.x + panX; }
  get screenY() { return this.y + panY; }
  get isSelected() { return selected.has(this.name); }
  get displayRadius() {
    const pulse = this.isSelected ? Math.sin(animationTime * 2 + this.pulsePhase) * 2 : 0;
    return this.radius * this.scale + pulse;
  }
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function buildGenreNodes() {
  nodes = [];
  connections = [];
  const cx = W / 2;
  const cy = H / 2 - 40;
  const genreRadius = Math.min(W, H) * 0.3;

  TAXONOMY.forEach((genre, gi) => {
    const angle = (gi / TAXONOMY.length) * Math.PI * 2 - Math.PI / 2;
    const gx = cx + Math.cos(angle) * genreRadius;
    const gy = cy + Math.sin(angle) * genreRadius;
    const gNode = new Node(genre.name, 'genre', gx, gy, genre.color, null);
    gNode.visible = true;
    gNode.scale = 1;
    nodes.push(gNode);

    // Subgenres
    genre.children.forEach((sub, si) => {
      const subAngle = angle + ((si - (genre.children.length - 1) / 2) * 0.35);
      const subDist = 90 + Math.min(W, H) * 0.08;
      const sx = gx + Math.cos(subAngle) * subDist;
      const sy = gy + Math.sin(subAngle) * subDist;
      const sNode = new Node(sub.name, 'sub', sx, sy, genre.color, gNode);
      nodes.push(sNode);
      connections.push({ from: gNode, to: sNode });

      // Micro-genres
      sub.children.forEach((micro, mi) => {
        const microAngle = subAngle + ((mi - (sub.children.length - 1) / 2) * 0.4);
        const microDist = 55 + Math.min(W, H) * 0.03;
        const mx = sx + Math.cos(microAngle) * microDist;
        const my = sy + Math.sin(microAngle) * microDist;
        const mNode = new Node(micro, 'micro', mx, my, genre.color, sNode);
        nodes.push(mNode);
        connections.push({ from: sNode, to: mNode });
      });
    });
  });
}

function toggleGenre(genreName) {
  if (expandedGenres.has(genreName)) {
    expandedGenres.delete(genreName);
    // Collapse all subs of this genre
    const genre = TAXONOMY.find(g => g.name === genreName);
    if (genre) genre.children.forEach(s => expandedSubs.delete(s.name));
  } else {
    expandedGenres.add(genreName);
  }
  updateVisibility();
}

function toggleSub(subName) {
  if (expandedSubs.has(subName)) {
    expandedSubs.delete(subName);
  } else {
    expandedSubs.add(subName);
  }
  updateVisibility();
}

function toggleSelection(name) {
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  updateSelectedPanel();
}

function updateVisibility() {
  nodes.forEach(n => {
    if (n.type === 'genre') {
      n.visible = true;
      n.targetScale = 1;
    } else if (n.type === 'sub') {
      const parentGenre = n.parent;
      n.visible = expandedGenres.has(parentGenre.name);
      n.targetScale = n.visible ? 1 : 0;
    } else if (n.type === 'micro') {
      const parentSub = n.parent;
      n.visible = expandedSubs.has(parentSub.name);
      n.targetScale = n.visible ? 1 : 0;
    }
  });
}

function updateSelectedPanel() {
  const panel = document.getElementById('selectedPanel');
  const container = document.getElementById('selectedTags');
  if (selected.size === 0) {
    panel.classList.add('empty');
    return;
  }
  panel.classList.remove('empty');

  let html = '';
  selected.forEach(name => {
    const node = nodes.find(n => n.name === name);
    if (node) {
      const cls = node.type;
      html += `<span class="selected-tag ${cls}" onclick="toggleSelection('${name.replace(/'/g, "\\'")}')">${name}<span class="x">×</span></span>`;
    }
  });
  container.innerHTML = html;
}

// ─── RENDERING ──────────────────────────────────────────────────────────
function drawConnection(conn) {
  const from = conn.from;
  const to = conn.to;
  if (to.scale < 0.05) return;

  const alpha = to.scale * 0.3;
  ctx.beginPath();
  ctx.moveTo(from.screenX, from.screenY);
  ctx.lineTo(to.screenX, to.screenY);
  ctx.strokeStyle = to.color + Math.round(alpha * 255).toString(16).padStart(2, '0');
  ctx.lineWidth = to.type === 'micro' ? 1 : 1.5;
  ctx.stroke();
}

function drawNode(node) {
  if (node.scale < 0.02) return;

  const x = node.screenX;
  const y = node.screenY;
  const r = node.displayRadius;
  const isSel = node.isSelected;
  const isHov = hoveredNode === node;

  // Glow
  const glowSize = isSel ? r * 2.5 : isHov ? r * 2 : r * 1.5;
  const glowAlpha = isSel ? 0.4 : isHov ? 0.25 : 0.1;
  const grad = ctx.createRadialGradient(x, y, r * 0.3, x, y, glowSize);
  grad.addColorStop(0, node.color + Math.round(glowAlpha * 255).toString(16).padStart(2, '0'));
  grad.addColorStop(1, node.color + '00');
  ctx.beginPath();
  ctx.arc(x, y, glowSize, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Node body
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const bodyAlpha = isSel ? 0.9 : isHov ? 0.7 : 0.4;
  ctx.fillStyle = node.color + Math.round(bodyAlpha * 255).toString(16).padStart(2, '0');
  ctx.fill();

  // Border
  if (isSel || isHov) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.strokeStyle = node.color + (isSel ? 'cc' : '66');
    ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.stroke();
  }

  // Label
  const fontSize = node.type === 'genre' ? 11 : node.type === 'sub' ? 10 : 9;
  ctx.font = `${isSel ? 600 : 500} ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (node.type === 'genre') {
    // Label below node
    ctx.fillStyle = '#fff';
    ctx.fillText(node.name, x, y + r + 14);
  } else {
    // Label inside/beside node
    const labelAlpha = node.scale;
    ctx.fillStyle = `rgba(255,255,255,${labelAlpha * (isSel ? 1 : 0.85)})`;
    if (node.type === 'micro') {
      ctx.fillText(node.name, x, y + r + 12);
    } else {
      ctx.fillText(node.name, x, y + r + 12);
    }
  }

  // Selection checkmark
  if (isSel) {
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('✓', x, y);
  }
}

function render() {
  animationTime += 0.016;

  // Animate nodes
  nodes.forEach(n => {
    n.scale += (n.targetScale - n.scale) * 0.12;
    if (n.visible && n.parent) {
      n.x += (n.targetX - n.x) * 0.08;
      n.y += (n.targetY - n.y) * 0.08;
    } else if (!n.visible && n.parent) {
      n.x += (n.parent.x - n.x) * 0.1;
      n.y += (n.parent.y - n.y) * 0.1;
    }
  });

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background grid dots
  const dotSpacing = 40;
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let x = (panX % dotSpacing + dotSpacing) % dotSpacing; x < W; x += dotSpacing) {
    for (let y = (panY % dotSpacing + dotSpacing) % dotSpacing; y < H; y += dotSpacing) {
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw connections
  connections.forEach(drawConnection);

  // Draw nodes (micros first, then subs, then genres on top)
  const micros = nodes.filter(n => n.type === 'micro');
  const subs = nodes.filter(n => n.type === 'sub');
  const genres = nodes.filter(n => n.type === 'genre');
  micros.forEach(drawNode);
  subs.forEach(drawNode);
  genres.forEach(drawNode);

  requestAnimationFrame(render);
}

// ─── INTERACTION ────────────────────────────────────────────────────────
function getNodeAt(px, py) {
  // Check in reverse draw order (genres first since they're on top)
  const all = [...nodes].reverse();
  for (const n of all) {
    if (n.scale < 0.3) continue;
    const dx = px - n.screenX;
    const dy = py - n.screenY;
    const hitR = Math.max(n.displayRadius, 22); // min touch target
    if (dx * dx + dy * dy < hitR * hitR) return n;
  }
  return null;
}

function handleTap(x, y) {
  const node = getNodeAt(x, y);
  if (!node) return;

  document.getElementById('instructions').classList.add('fade');

  if (node.type === 'genre') {
    toggleGenre(node.name);
    toggleSelection(node.name);
  } else if (node.type === 'sub') {
    toggleSub(node.name);
    toggleSelection(node.name);
  } else {
    toggleSelection(node.name);
  }
}

// Mouse events
canvas.addEventListener('mousedown', e => {
  isPanning = true;
  panStart = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
  hoveredNode = getNodeAt(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', e => {
  if (isPanning && !getNodeAt(e.clientX, e.clientY)) {
    panOffset.x = e.clientX - panStart.x;
    panOffset.y = e.clientY - panStart.y;
    panX = panOffset.x;
    panY = panOffset.y;
  }
  hoveredNode = getNodeAt(e.clientX, e.clientY);
  canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';

  // Tooltip
  const tt = document.getElementById('tooltip');
  if (hoveredNode) {
    tt.textContent = hoveredNode.isSelected ? `${hoveredNode.name} (click to remove)` : hoveredNode.name;
    tt.style.left = (e.clientX + 15) + 'px';
    tt.style.top = (e.clientY - 30) + 'px';
    tt.classList.add('show');
  } else {
    tt.classList.remove('show');
  }
});

canvas.addEventListener('mouseup', e => {
  if (isPanning) {
    const dx = Math.abs(e.clientX - (panStart.x + panOffset.x));
    const dy = Math.abs(e.clientY - (panStart.y + panOffset.y));
    // Only count as tap if barely moved
    if (dx < 5 && dy < 5) {
      handleTap(e.clientX, e.clientY);
    }
  }
  isPanning = false;
});

// Touch events
let touchId = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchId = t.identifier;
  touchStartTime = Date.now();
  panStart = { x: t.clientX - panOffset.x, y: t.clientY - panOffset.y };
  isPanning = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = Array.from(e.touches).find(tt => tt.identifier === touchId);
  if (!t) return;
  const node = getNodeAt(t.clientX, t.clientY);
  if (!node) {
    panOffset.x = t.clientX - panStart.x;
    panOffset.y = t.clientY - panStart.y;
    panX = panOffset.x;
    panY = panOffset.y;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dt = Date.now() - touchStartTime;
  const dx = Math.abs(t.clientX - (panStart.x + panOffset.x));
  const dy = Math.abs(t.clientY - (panStart.y + panOffset.y));
  if (dt < 300 && dx < 15 && dy < 15) {
    handleTap(t.clientX, t.clientY);
  }
  isPanning = false;
}, { passive: false });

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  selected.clear();
  expandedGenres.clear();
  expandedSubs.clear();
  updateVisibility();
  updateSelectedPanel();
  panX = 0; panY = 0;
  panOffset = { x: 0, y: 0 };
});

// ─── INIT ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { resize(); buildGenreNodes(); });
resize();
buildGenreNodes();
render();
</script>
</body>
</html>
